services:
  api:
    build: { context: ., dockerfile: src/harness/api/Dockerfile }
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [qdrant]
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
  # ollama:                      # uncomment for the local Gemma-4 path
  #   image: ollama/ollama:latest
  #   ports: ["11434:11434"]
  #   volumes: ["ollama_data:/root/.ollama"]
volumes:
  qdrant_data:
  # ollama_data:
